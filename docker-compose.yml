services:
  db:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ghw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecure}
      POSTGRES_DB: ${POSTGRES_DB:-auth_site}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 1s
      timeout: 2s
      retries: 10
      start_period: 1s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_BASE_PATH: ${APP_BASE_PATH:-/auth}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8190}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BACKUP_DIR: /workspace/backups
      BACKUP_SCRIPT_PATH: /workspace/db/create_backup.sh
    working_dir: /workspace/api
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy

  db-backup:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BACKUP_DIR: /backups
      BACKUP_UID: ${BACKUP_UID:-1000}
      BACKUP_GID: ${BACKUP_GID:-1000}
      BACKUP_INTERVAL_MINUTES: ${BACKUP_INTERVAL_MINUTES:-360}
    command: ["/bin/sh", "/opt/backup/backup-loop.sh"]
    volumes:
      - ./db:/opt/backup:ro
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/auth}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/auth/api/v1}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://api:8000}
    working_dir: /workspace/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8191"
    volumes:
      - .:/workspace
    depends_on:
      - api
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:8191:8191"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/auth}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/auth/api/v1}
    restart: unless-stopped
    environment:
      APP_BASE_PATH: ${APP_BASE_PATH:-/auth}
    depends_on:
      - api
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:8190:80"

volumes:
  postgres-data:
