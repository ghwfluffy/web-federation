services:
  central_db:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 1s
      timeout: 2s
      retries: 10
      start_period: 1s

  central_api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    working_dir: /workspace/api
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/workspace
      - ./backups:/backups
    depends_on:
      central_db:
        condition: service_healthy

  central_db_backup:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    command: ["/bin/sh", "/opt/backup/backup-loop.sh"]
    volumes:
      - ./db:/opt/backup:ro
      - ./backups:/backups
    depends_on:
      central_db:
        condition: service_healthy

  central_web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: dev
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-${APP_BASE_PATH:?APP_BASE_PATH is required in .env}}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        API_V1_PREFIX: ${API_V1_PREFIX:?API_V1_PREFIX is required in .env}
        VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:?VITE_API_PROXY_TARGET is required in .env}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-${APP_BASE_PATH:?APP_BASE_PATH is required in .env}}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    working_dir: /workspace/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8191"
    volumes:
      - .:/workspace
    depends_on:
      - central_api
    ports:
      - "${BIND_ADDRESS:?BIND_ADDRESS is required in .env}:8191:8191"

  central_nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-${APP_BASE_PATH:?APP_BASE_PATH is required in .env}}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        API_V1_PREFIX: ${API_V1_PREFIX:?API_V1_PREFIX is required in .env}
        VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:?VITE_API_PROXY_TARGET is required in .env}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - central_api
    ports:
      - "${BIND_ADDRESS:?BIND_ADDRESS is required in .env}:8190:80"

volumes:
  postgres-data:
